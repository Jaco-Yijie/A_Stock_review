name: A股每日自动复盘

on:
  schedule:
    # 北京时间 15:05 收盘后5分钟（UTC 07:05），周一到周五
    - cron: '5 7 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '指定复盘日期（格式 YYYY-MM-DD，留空则为今日）'
        required: false
        default: ''

jobs:
  generate-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r scripts/requirements.txt

      - name: 生成复盘
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_DATE: ${{ github.event.inputs.date }}
        run: python scripts/generate_review.py

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews/
          if ! git diff --staged --quiet; then
            git commit -m "自动复盘 $(TZ='Asia/Shanghai' date +'%Y-%m-%d')"
            git push
          else
            echo "无新内容，跳过提交"
          fi
